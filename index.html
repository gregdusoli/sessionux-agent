<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sessionux Agent</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #101419;
        color: #e8edf2;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(420px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 650;
      }

      p {
        margin: 0;
        color: #9aa8b5;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <!-- Temporary disposable placeholder. Replace this file when the planned UI is implemented. -->
    <main>
      <h1>Sessionux Agent</h1>
      <p>Control your workstation from your phone.</p>
      <button id="pair-btn" style="margin-top: 24px; padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">
        Pair New Device
      </button>
    </main>
    <script>
      const { ipcRenderer } = require('electron');
      document.getElementById('pair-btn').addEventListener('click', () => {
        ipcRenderer.send('start-pairing');
      });
    </script>

  </body>
</html>
