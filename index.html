<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sessionux - Trusted Devices</title>
    <style>
      :root {
        --bg: #0a0c10;
        --card: #161b22;
        --text: #e6edf3;
        --text-dim: #8b949e;
        --accent: #2f81f7;
        --danger: #f85149;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }

      body {
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      main {
        width: 100%;
        max-width: 600px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 32px;
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
        margin: 0;
      }

      .btn {
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.1);
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--accent);
        color: white;
      }

      .btn-danger {
        background: transparent;
        color: var(--danger);
      }

      .btn-danger:hover {
        background: var(--danger);
        color: white;
      }

      .device-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .device-card {
        background: var(--card);
        padding: 16px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .device-info h3 {
        margin: 0 0 4px;
        font-size: 16px;
      }

      .device-info p {
        margin: 0;
        font-size: 13px;
        color: var(--text-dim);
      }

      .empty-state {
        text-align: center;
        padding: 48px;
        color: var(--text-dim);
        border: 2px dashed rgba(255,255,255,0.05);
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Trusted Devices</h1>
        <button id="pair-btn" class="btn btn-primary">Pair New</button>
      </header>

      <div id="device-list" class="device-list">
        <div class="empty-state">Loading devices...</div>
      </div>
    </main>

    <script>
      const { ipcRenderer } = require('electron');

      async function refreshDevices() {
        try {
          const res = await fetch('http://localhost:3000/devices');
          const devices = await res.json();
          
          const list = document.getElementById('device-list');
          if (devices.length === 0) {
            list.innerHTML = '<div class="empty-state">No devices paired yet.</div>';
            return;
          }

          list.innerHTML = '';
          devices.forEach(device => {
            const card = document.createElement('div');
            card.className = 'device-card';
            card.innerHTML = `
              <div class="device-info">
                <h3>${device.name}</h3>
                <p>Added on ${new Date(device.addedAt).toLocaleDateString()}</p>
                <p>Last unlock: ${device.lastUnlock ? new Date(device.lastUnlock).toLocaleString() : 'Never'}</p>
              </div>
              <button class="btn btn-danger" onclick="removeDevice('${device.id}')">Remove</button>
            `;
            list.appendChild(card);
          });
        } catch (err) {
          document.getElementById('device-list').innerHTML = '<div class="empty-state">Failed to load devices. Make sure Agent is running.</div>';
        }
      }

      async function removeDevice(id) {
        if (!confirm('Are you sure you want to remove this device?')) return;
        await fetch(`http://localhost:3000/devices/${id}`, { method: 'DELETE' });
        refreshDevices();
      }

      document.getElementById('pair-btn').addEventListener('click', () => {
        ipcRenderer.send('start-pairing');
      });

      refreshDevices();
      // Polling refresh
      setInterval(refreshDevices, 5000);
    </script>
  </body>
</html>
