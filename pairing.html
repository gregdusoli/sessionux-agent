<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pair Device - Sessionux</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: #101419;
      color: #e8edf2;
    }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    #qrcode-container {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    img {
      display: block;
      width: 256px;
      height: 256px;
    }
    #qr-svg {
      width: 256px;
      height: 256px;
    }
    #qr-svg svg {
      display: block;
      width: 256px;
      height: 256px;
    }
    .hidden {
      display: none;
    }
    .error {
      color: #ff9b9b;
      font-size: 14px;
      max-width: 320px;
    }
    .timer {
      font-size: 14px;
      color: #9aa8b5;
      margin-top: 12px;
    }
    .cancel-btn {
      margin-top: 32px;
      padding: 10px 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #e8edf2;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cancel-btn:hover {
      background: rgba(255, 0, 0, 0.1);
      border-color: rgba(255, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <h1>Pair New Device</h1>
  <p>Scan this code with the Sessionux Mobile app</p>
  
  <div id="qrcode-container">
    <img id="qr-image" class="hidden" alt="Sessionux pairing QR Code" />
    <div id="qr-svg" class="hidden"></div>
  </div>

  <div class="error hidden" id="pairing-error"></div>

  <div class="timer" id="timer">Expires in: <span id="countdown">120</span>s</div>

  <button class="cancel-btn" id="cancel-btn">Cancel Pairing</button>

  <script>
    function renderPairingData(data) {
      const { qrDataUrl, qrSvg, expiresAt } = data;
      const qrSvgContainer = document.getElementById('qr-svg');
      const qrImage = document.getElementById('qr-image');
      const pairingError = document.getElementById('pairing-error');

      const showSvgFallback = () => {
        if (!qrSvg) {
          pairingError.innerText = 'Unable to render pairing QR Code.';
          pairingError.classList.remove('hidden');
          return;
        }

        qrSvgContainer.innerHTML = qrSvg;
        qrSvgContainer.classList.remove('hidden');
        qrImage.classList.add('hidden');
        pairingError.classList.add('hidden');
      };

      if (qrDataUrl) {
        qrImage.onload = () => {
          qrImage.classList.remove('hidden');
          qrSvgContainer.classList.add('hidden');
          pairingError.classList.add('hidden');
        };
        qrImage.onerror = showSvgFallback;
        qrImage.src = qrDataUrl;
      } else if (qrSvg) {
        showSvgFallback();
      } else {
        pairingError.innerText = 'Unable to render pairing QR Code.';
        pairingError.classList.remove('hidden');
        return;
      }

      const updateTimer = () => {
        const remaining = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000));
        document.getElementById('countdown').innerText = remaining;
        if (remaining <= 0) {
          window.sessionux.cancelPairing();
        }
      };

      setInterval(updateTimer, 1000);
      updateTimer();
    }

    window.renderPairingData = renderPairingData;

    window.sessionux.onPairingData(renderPairingData);

    window.sessionux.onPairingError((data) => {
      document.getElementById('pairing-error').innerText =
        data?.message || 'Unable to generate pairing QR Code.';
      document.getElementById('pairing-error').classList.remove('hidden');
    });

    document.getElementById('cancel-btn').addEventListener('click', () => {
      window.sessionux.cancelPairing();
    });
  </script>
</body>
</html>
